# inpiration from https://dev.to/qmenoret/dynamic-templates-with-tmuxinator-4mkh

<% if @args[0] %>
<% WDIR=@args[0] %> 
<% else %>
<% WDIR=ENV["PWD"] %>
<% end %>

name: <%= WDIR.split('/').last.downcase  %>
root: <%= @args[0] %>

# example usage:
# tmuxinator two-windows ~/projects/learning-rust

windows:
  - editor:
      # layout: 4cb0,202x42,0,0[202x33,0,0,4,202x8,0,34,6]
      panes:
        - editor:
            - '[ -f ".txconf.sh" ] && bash .txconf.sh "w1-p1"'
            - clear
        # - preview:
        #   - '[ -f ".txconf.sh" ] && bash .txconf.sh "w1-p2"'
  - sh:
      panes:
        - sh:
          - $([ -f ".txconf.sh" ] && bash .txconf.sh "w1-p2") || clear
          - clear
  - sh:
      panes:
        - sh:
          - $([ -f ".txconf.sh" ] && bash .txconf.sh "w1-p2") || clear
          - clear
  - cl:
      panes:
        - cl:
          - loadnode
          - clear
        - spare:
          - clear
  - cx:
      panes:
        - cx:
          - clear
        - spare:
          - clear
  - oc:
      panes:
        - oc:
          - clear
        - spare:
          - clear
  - am:
      panes:
        - am:
          - loadnode
          - clear
        - spare:
          - clear
