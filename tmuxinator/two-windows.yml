# inpiration from https://dev.to/qmenoret/dynamic-templates-with-tmuxinator-4mkh

<% if @args[0] %>
<% WDIR=@args[0] %> 
<% else %>
<% WDIR=ENV["PWD"] %>
<% end %>

name: <%= WDIR.split('/').last.downcase  %>
root: <%= @args[0] %>

# example usage:
# tmuxinator two-windows ~/projects/learning-rust

windows:
  - editor:
      # layout: 4cb0,202x42,0,0[202x33,0,0,4,202x8,0,34,6]
      panes:
        - editor:
  - sh:
      panes:
        - sh:
  - sh:
      panes:
        - sh:
  - oc:
      panes:
        - main:
          - sleep 1 && tmux resize-pane -Z && clear
        - spare:
